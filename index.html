<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AIRS</title>
  <script>
    (function redirectToSpa() {
      if ("scrollRestoration" in window.history) {
        window.history.scrollRestoration = "manual";
      }
      window.scrollTo(0, 0);
      const hostname = window.location.hostname.toLowerCase();
      const isMobileHost = hostname === "m.localhost" || hostname.startsWith("m.");
      const target = new URL("./spa/index.html", window.location.href);
      const query = window.location.search || "";
      const hash = isMobileHost ? "#/m" : "#/";
      window.location.replace(`${target.toString()}${hash}${query}`);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=./spa/index.html">
  </noscript>
</head>
<body></body>
</html>
