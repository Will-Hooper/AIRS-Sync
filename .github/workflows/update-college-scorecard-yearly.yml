name: Update College Scorecard Yearly

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 3 15 1 *'

permissions:
  contents: write

concurrency:
  group: college-scorecard-yearly
  cancel-in-progress: false

jobs:
  update-college-scorecard:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Build Node sync CLI
        shell: pwsh
        run: npm run build:node

      - name: Refresh College Scorecard program outcomes
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "college-scorecard-yearly.log"
          & node ./dist-node/src-node/college-scorecard-sync.js 2>&1 | Tee-Object -FilePath $logPath
          $nodeExit = $LASTEXITCODE
          if ($nodeExit -ne 0) {
            exit $nodeExit
          }
          "## College Scorecard 年度同步" >> $env:GITHUB_STEP_SUMMARY
          "- 日志文件: college-scorecard-yearly.log" >> $env:GITHUB_STEP_SUMMARY

      - name: Commit updated College Scorecard data
        shell: pwsh
        run: |
          $paths = @(
            "backend/data/college_scorecard_programs.json",
            "backend/data/college_scorecard_cip_summary.json"
          )
          $pending = git status --porcelain -- $paths
          if (-not $pending) {
            Write-Host "No College Scorecard changes to commit."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $paths
          git commit -m "chore(data): yearly College Scorecard refresh"
          git push

      - name: Upload College Scorecard log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: college-scorecard-yearly-log
          path: ${{ runner.temp }}/*.log
          if-no-files-found: ignore

      - name: Write College Scorecard failure summary
        if: failure()
        shell: pwsh
        run: |
          "## College Scorecard 年度同步失败" >> $env:GITHUB_STEP_SUMMARY
          "- 请检查 college-scorecard-yearly-log artifact 和 Actions 日志。" >> $env:GITHUB_STEP_SUMMARY
