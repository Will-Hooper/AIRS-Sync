name: Update College Scorecard Monthly

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 3 1 * *'

permissions:
  contents: write

concurrency:
  group: college-scorecard-sync
  cancel-in-progress: false

jobs:
  update-college-scorecard:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Build Node sync CLI
        shell: pwsh
        run: npm run build:node

      - name: Refresh College Scorecard program outcomes
        shell: pwsh
        run: node ./dist-node/src-node/college-scorecard-sync.js

      - name: Commit updated College Scorecard data
        shell: pwsh
        run: |
          $paths = @(
            "backend/data/college_scorecard_programs.json",
            "backend/data/college_scorecard_cip_summary.json"
          )
          $pending = git status --porcelain -- $paths
          if (-not $pending) {
            Write-Host "No College Scorecard changes to commit."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $paths
          git commit -m "chore(data): monthly College Scorecard refresh"
          git push
