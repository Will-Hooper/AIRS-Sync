<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Compatibility redirect entry for legacy H5 occupation links. Keep the
       mobile-host branch available until m.airsindex.com is migrated. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIRS Occupation</title>
  <script>
    (function redirectLegacyOccupation() {
      const hostname = window.location.hostname.toLowerCase();
      const isMobileHost = hostname === "m.localhost" || hostname.startsWith("m.");
      const params = new URLSearchParams(window.location.search);
      const soc = params.get("soc") || "";
      params.delete("soc");
      const query = params.toString();
      const target = new URL("./spa/index.html", window.location.href);
      const hash = soc
        ? `${isMobileHost ? "#/m/occupation/" : "#/occupation/"}${encodeURIComponent(soc)}${query ? `?${query}` : ""}`
        : `${isMobileHost ? "#/m/occupation" : "#/occupation"}${query ? `?${query}` : ""}`;
      window.location.replace(`${target.toString()}${hash}`);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=./spa/index.html">
  </noscript>
</head>
<body></body>
</html>
